name: publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version from tag
        run: |
          # Removes 'v' prefix from tag (e.g., v1.0.0 -> 1.0.0)
          VERSION=${GITHUB_REF_NAME#v}
          echo "PACKAGE_VERSION=$VERSION" >> $GITHUB_ENV
          echo "Extracted version from tag: $VERSION"

      - name: Setup Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install pypa/build and build
        run: |
          pip install build
          python -m build --sdist --wheel --outdir dist/ .

      - name: Upload files to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*

      - name: Publish to PyPI
        if: startsWith(github.ref, 'refs/tags')
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Configure git
        run: |
          git config --local user.name "GitHub Actions Bot"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Deploy docs for release version to gh-pages branch
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          pip install .[docs]
          mike deploy --push --update-aliases "${{ env.PACKAGE_VERSION }}" latest
